version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: v2_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: v2_standoff
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    command: mongod --quiet

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
